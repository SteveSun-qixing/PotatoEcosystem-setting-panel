schemaVersion: "1.0.0"
id: "chips-official.ecosystem-settings"
name: "i18n.plugin.699007"
version: "1.0.0"
type: "app"
autoStart: true
publisher: "Chips Official"
description: "i18n.plugin.699008"
icon: "assets/icon.png"

entry:
  main: "dist/index.html"

ui:
  layout:
    owner: "page"
    unit: "cpx"
    baseWidth: 1024
    contract: "./contracts/page-layout.contract.json"
    minFunctionalSet: "./contracts/min-functional-set.json"

permissions:
  - sys.read
  - sys.restart
  - plugin.read
  - plugin.install
  - plugin.uninstall
  - plugin.manage
  - config.read
  - config.write
  - theme.read
  - theme.write
  - i18n.read
  - i18n.write

window:
  width: 1220
  height: 780
  minWidth: 900
  minHeight: 620
  resizable: true
  frame: true

locales:
  default: "zh-CN"
  supported: ["zh-CN", "en-US", "ja-JP"]
  path: "locales"

compatibility:
  host: "^1.0.0"
