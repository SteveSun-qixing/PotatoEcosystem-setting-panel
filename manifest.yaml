schemaVersion: "1.0.0"
id: "chips-official.ecosystem-settings"
name: "生态设置面板"
version: "1.0.0"
type: "app"
autoStart: true
publisher: "Chips Official"
description: "薯片生态设置面板，提供运行状态监控、插件管理与通用配置管理能力。"
icon: "assets/icon.png"

entry:
  main: "dist/index.html"

permissions:
  - sys.read
  - sys.restart
  - plugin.read
  - plugin.install
  - plugin.uninstall
  - plugin.manage
  - config.read
  - config.write
  - theme.read
  - i18n.read
  - i18n.write

window:
  width: 1220
  height: 780
  minWidth: 900
  minHeight: 620
  resizable: true
  frame: true

locales:
  default: "zh-CN"
  supported: ["zh-CN", "en-US", "ja-JP"]

compatibility:
  host: "^1.0.0"
